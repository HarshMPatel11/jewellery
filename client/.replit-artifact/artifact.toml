kind = "web"
previewPath = "/"
title = "Jewellery Store"
version = "1.0.0"
id = "artifacts/jewellery-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23307

[services.development]
run = "pnpm --filter @workspace/jewellery-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jewellery-store", "run", "build" ]
publicDir = "artifacts/jewellery-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23307"
BASE_PATH = "/"
